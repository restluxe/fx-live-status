<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>LIVE — fx-trading テストネット監視</title>
<style>
  /* 監視端末として意図的にダーク単一テーマ */
  :root {
    --bg:#0e1412; --panel:#161d1a; --panel2:#1b2420; --line:#26312c;
    --ink:#e8efe9; --soft:#8fa39a; --grn:#4fd08c; --red:#ef7a68; --amber:#e2b04a;
    --mono:"SF Mono",Menlo,monospace;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); line-height:1.6;
         font-family:"Hiragino Sans","Yu Gothic",sans-serif; font-size:15px;
         padding-bottom:40px; }
  .wrap { max-width:560px; margin:0 auto; padding:16px 14px; }
  header { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .pulse { width:12px; height:12px; border-radius:50%; background:var(--grn); flex:none;
           box-shadow:0 0 10px var(--grn); animation:blink 2s infinite; }
  .pulse.off { background:var(--red); box-shadow:0 0 10px var(--red); animation:none; }
  .pulse.done { background:var(--amber); box-shadow:none; animation:none; }
  @keyframes blink { 50% { opacity:.45; } }
  @media (prefers-reduced-motion: reduce) { .pulse { animation:none; } }
  h1 { font-size:16px; margin:0; letter-spacing:.04em; }
  .age { margin-left:auto; font-family:var(--mono); font-size:12px; color:var(--soft); }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:10px;
          padding:14px 16px; margin-bottom:12px; }
  .k { font-size:11px; letter-spacing:.14em; color:var(--soft); margin-bottom:2px; }
  .big { font-family:var(--mono); font-size:30px; font-weight:700;
         font-variant-numeric:tabular-nums; }
  .row { display:flex; gap:12px; }
  .row .card { flex:1; margin-bottom:0; }
  .row { margin-bottom:12px; }
  .v { font-family:var(--mono); font-size:17px; font-weight:700;
       font-variant-numeric:tabular-nums; }
  .up { color:var(--grn); } .down { color:var(--red); } .amber { color:var(--amber); }
  .nopos { color:var(--soft); font-size:14px; }
  table { width:100%; border-collapse:collapse; font-size:12.5px; }
  th { text-align:left; color:var(--soft); font-size:10.5px; letter-spacing:.1em;
       padding:4px 6px; border-bottom:1px solid var(--line); }
  td { padding:6px; border-bottom:1px solid var(--line);
       font-family:var(--mono); font-variant-numeric:tabular-nums; }
  tr:last-child td { border-bottom:none; }
  .log { font-family:var(--mono); font-size:11px; color:var(--soft);
         background:var(--panel2); border-radius:8px; padding:10px 12px;
         overflow-x:auto; white-space:pre; }
  .empty { color:var(--soft); font-size:13px; }
  .meta { font-size:12px; color:var(--soft); }
  footer { text-align:center; color:var(--soft); font-size:11px; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="pulse" id="pulse"></div>
    <h1>テストネット自動売買 <span id="state" class="amber">接続中…</span></h1>
    <div class="age" id="age"></div>
  </header>

  <div class="row">
    <div class="card">
      <div class="k">残高（USDT・偽のお金）</div>
      <div class="big" id="equity">—</div>
    </div>
    <div class="card">
      <div class="k">進捗</div>
      <div class="big" id="progress">—</div>
      <div class="meta" id="meta"></div>
    </div>
  </div>

  <div class="card">
    <div class="k">ポジション</div>
    <div id="position" class="nopos">—</div>
  </div>

  <div class="card">
    <div class="k">最新の確定足</div>
    <div id="bar" class="nopos">—</div>
  </div>

  <div class="card">
    <div class="k">決済済み取引（このセッション）</div>
    <div id="trades" class="empty">まだありません</div>
  </div>

  <div class="card">
    <div class="k">発注ログ（最新10件）</div>
    <div class="log" id="orders">—</div>
  </div>

  <footer>状態は約5分間隔で公開（約定・決済は即時）／ 心拍が15分途絶えると「停止?」表示 ／ テストネット（実資金ではありません）</footer>
</div>
<script>
const $ = id => document.getElementById(id);
const fmt = (v, d=2) => v == null ? '—' : Number(v).toLocaleString('ja-JP', {maximumFractionDigits:d});

async function refresh() {
  let s;
  try {
    const r = await fetch('live_status.json?t=' + Date.now(), {cache:'no-store'});
    if (!r.ok) throw new Error(r.status);
    s = await r.json();
  } catch (e) {
    $('state').textContent = '状態ファイルなし';
    $('state').className = 'amber';
    $('pulse').className = 'pulse off';
    return;
  }

  const ageSec = Math.max(0, (Date.now() - Date.parse(s.updated)) / 1000);
  $('age').textContent = Math.round(ageSec) + '秒前';
  const stale = ageSec > 900;
  const running = s.state === '稼働中' && !stale;
  $('state').textContent = stale && s.state === '稼働中' ? '停止?（心拍なし）' : s.state;
  $('state').className = running ? 'up' : (s.state === '完了' ? 'amber' : 'down');
  $('pulse').className = 'pulse' + (running ? '' : (s.state === '完了' ? ' done' : ' off'));

  $('equity').textContent = fmt(s.equity);
  $('progress').textContent = s.bars_done + ' / ' + s.bars_max + '本';
  $('meta').textContent = (s.meta.symbol || '') + ' ' + (s.meta.timeframe || '') +
                          '　' + (s.meta.strategy || '');

  if (s.position) {
    const p = s.position;
    $('position').innerHTML =
      '<span class="v ' + (p.side === 'LONG' ? 'up' : 'down') + '">' + p.side + '</span>' +
      '　<span class="v">' + p.units + '枚</span><br>' +
      '<span class="meta">建値 ' + fmt(p.entry) + '　損切り ' + fmt(p.stop) + '</span>';
  } else {
    $('position').innerHTML = '<span class="nopos">ノーポジション（次のシグナル待ち）</span>';
  }

  $('bar').innerHTML = s.last_bar
    ? '<span class="v">' + fmt(s.last_bar.close) + '</span> <span class="meta">' + s.last_bar.dt + '</span>'
    : '<span class="nopos">まだ足を受信していません</span>';

  if (s.trades && s.trades.length) {
    $('trades').innerHTML = '<table><tr><th>決済</th><th>方向</th><th>建値→決済</th><th>損益</th></tr>' +
      s.trades.slice(-8).reverse().map(t =>
        '<tr><td>' + t.exit_dt + '</td><td>' + t.side + '</td>' +
        '<td>' + fmt(t.entry) + '→' + fmt(t.exit) + '</td>' +
        '<td class="' + (t.pnl >= 0 ? 'up' : 'down') + '">' + (t.pnl >= 0 ? '+' : '') + fmt(t.pnl) + '</td></tr>'
      ).join('') + '</table>';
  }

  try {
    const r = await fetch('testnet_orders.jsonl?t=' + Date.now(), {cache:'no-store'});
    if (r.ok) {
      const lines = (await r.text()).trim().split('\n').filter(Boolean).slice(-10).reverse();
      $('orders').textContent = lines.map(l => {
        const o = JSON.parse(l);
        return o.ts.slice(5, 16).replace('T', ' ') + '  ' + o.event +
               (o.side ? ' ' + o.side : '') + (o.average ? ' @' + o.average : '') +
               (o.pnl != null ? ' pnl ' + o.pnl : '');
      }).join('\n') || 'まだ発注はありません';
    } else { $('orders').textContent = 'まだ発注はありません'; }
  } catch (e) { $('orders').textContent = 'まだ発注はありません'; }
}
refresh();
setInterval(refresh, 10_000);
</script>
</body>
</html>
