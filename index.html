<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>LIVE — fx-trading Public Status</title>
<style>
  :root {
    --bg:#0e1412; --panel:#161d1a; --line:#26312c;
    --ink:#e8efe9; --soft:#8fa39a; --grn:#4fd08c; --red:#ef7a68; --amber:#e2b04a;
    --mono:"SF Mono",Menlo,monospace;
  }
  body { margin:0; background:var(--bg); color:var(--ink); line-height:1.6;
         font-family:-apple-system,BlinkMacSystemFont,sans-serif; font-size:15px; }
  .wrap { max-width:500px; margin:0 auto; padding:24px 16px; }
  header { display:flex; align-items:center; gap:10px; margin-bottom:20px; }
  .pulse { width:12px; height:12px; border-radius:50%; background:var(--grn);
           box-shadow:0 0 10px var(--grn); }
  .pulse.Warning, .pulse.Error { background:var(--amber); box-shadow:0 0 10px var(--amber); }
  .pulse.Stopped, .pulse.Unknown { background:var(--red); box-shadow:0 0 10px var(--red); }
  h1 { font-size:16px; margin:0; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:8px;
          padding:16px; margin-bottom:12px; }
  .k { font-size:11px; color:var(--soft); text-transform:uppercase; letter-spacing:0.05em; }
  .v { font-family:var(--mono); font-size:16px; font-weight:bold; margin-top:4px; }
  .amber { color:var(--amber); }
  .red { color:var(--red); }
  .grn { color:var(--grn); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div id="pulse" class="pulse"></div>
    <h1>FX-Trading Public Monitor (Testnet)</h1>
  </header>
  <div class="card">
    <div class="k">Scheduler Status</div>
    <div id="status" class="v">—</div>
  </div>
  <div class="card">
    <div class="k">Last Processed Candle</div>
    <div id="last_candle" class="v">—</div>
  </div>
  <div class="card">
    <div class="k">Gap Detected / Missed Bars</div>
    <div id="gap" class="v">—</div>
  </div>
  <div class="card">
    <div class="k">Consecutive Failures</div>
    <div id="failures" class="v">—</div>
  </div>
  <div class="card">
    <div class="k">Stop Condition Triggered</div>
    <div id="stop" class="v">—</div>
  </div>
  <div class="card">
    <div class="k">Live Funds Active</div>
    <div id="live" class="v" style="color:var(--grn)">Disabled (Safe)</div>
  </div>
</div>
<script>
async function load() {
  try {
    const r = await fetch('public_status.json?t=' + Date.now());
    if (!r.ok) throw new Error();
    const s = await r.json();
    document.getElementById('status').textContent = s.status;
    document.getElementById('pulse').className = 'pulse ' + s.status;
    document.getElementById('last_candle').textContent = s.last_processed_candle;
    document.getElementById('gap').innerHTML = s.gap_detected 
      ? '<span class="amber">Warning: Gap Detected (Est: ' + s.missed_bars_estimate + ' bars)</span>'
      : '<span class="grn">Normal</span>';
    document.getElementById('failures').textContent = s.consecutive_failures;
    document.getElementById('stop').textContent = s.stop_condition_triggered ? 'Yes (Triggered)' : 'No';
  } catch(e) {
    document.getElementById('status').textContent = 'Connection Error';
    document.getElementById('pulse').className = 'pulse Unknown';
  }
}
load();
setInterval(load, 30000);
</script>
</body>
</html>
